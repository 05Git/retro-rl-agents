database: db/database.db
env:
  env_name: sf2
  n_envs: 8
  seed: 0
  venv_cls: subproc
  env_wrappers:
    - type: gym_grayscale
    - type: gym_resizeobs
      shape: !!python/tuple
        - 84
        - 84
    - type: gym_framestack
      num_stack: 4
    - type: gym_normreward
agent:
  model_type: ppo
  model_settings:
    policy: CnnPolicy
    learning_rate:
      - 2.e-5
      - 2.5e-6
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range:
      - 0.15
      - 0.025
    clip_range_vf:
      - 0.15
      - 0.025
    ent_coef: 0
    vf_coef: 0.5
    max_grad_norm: 0.5
    tensorboard_log: tensorboards/sf2
    verbose: 1
    stats_window_size: 100
    seed: 0
train:
  total_timesteps: 200_000_000
  tb_log_name: sf2_ppo
  progress_bar: true
  callback:
    - type: sb3_checkpoint
      save_freq: 50_000_000
      name_prefix: rl-model
      verbose: 2